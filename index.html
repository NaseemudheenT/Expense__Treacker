<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Expence Tracker</title>
  <link rel="icon" href="logo.png" type="image/png"/>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<!-- ========================================
     AUTH SCREEN
======================================== -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo-wrap">
      <img src="logo.png" alt="Expence Tracker" class="auth-logo-img"/>
    </div>
    <h1 class="auth-brand">EXPENCE<span>— TRACKER —</span></h1>

    <div class="auth-tabs">
      <button class="atab active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="atab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="field-row">
        <span class="field-icon"><i class="fas fa-envelope"></i></span>
        <input type="email" id="lEmail" placeholder="Email address" autocomplete="email"/>
      </div>
      <div class="field-row">
        <span class="field-icon"><i class="fas fa-lock"></i></span>
        <input type="password" id="lPass" placeholder="Password" autocomplete="current-password"/>
        <button class="eye-btn" onclick="eyeToggle('lPass',this)"><i class="fas fa-eye-slash"></i></button>
      </div>
      <p class="auth-err" id="lErr"></p>
      <button class="auth-submit-btn" id="lBtn" onclick="doLogin()">
        <span id="lBtnTxt">Login</span><span id="lSpin" class="spin hide"></span>
      </button>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm" class="hide">
      <div class="field-row">
        <span class="field-icon"><i class="fas fa-user"></i></span>
        <input type="text" id="sName" placeholder="Full Name" autocomplete="name"/>
      </div>
      <div class="field-row">
        <span class="field-icon"><i class="fas fa-envelope"></i></span>
        <input type="email" id="sEmail" placeholder="Email address" autocomplete="email"/>
      </div>
      <div class="field-row">
        <span class="field-icon"><i class="fas fa-lock"></i></span>
        <input type="password" id="sPass" placeholder="Password (min 6 chars)" autocomplete="new-password"/>
        <button class="eye-btn" onclick="eyeToggle('sPass',this)"><i class="fas fa-eye-slash"></i></button>
      </div>
      <div class="field-row">
        <span class="field-icon"><i class="fas fa-lock"></i></span>
        <input type="password" id="sConf" placeholder="Confirm Password" autocomplete="new-password"/>
        <button class="eye-btn" onclick="eyeToggle('sConf',this)"><i class="fas fa-eye-slash"></i></button>
      </div>
      <p class="auth-err" id="sErr"></p>
      <button class="auth-submit-btn" id="sBtn" onclick="doSignup()">
        <span id="sBtnTxt">Create Account</span><span id="sSpin" class="spin hide"></span>
      </button>
    </div>
  </div>
</div>

<!-- ========================================
     MAIN APP
======================================== -->
<div id="appScreen" class="hide">

  <!-- TOP HEADER -->
  <header class="topbar">
    <button class="icon-btn" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-center">
      <img src="logo.png" alt="logo" class="topbar-logo"/>
      <div class="topbar-brand">
        <span class="tb-main">EXPENCE</span>
        <span class="tb-sub">— TRACKER —</span>
      </div>
    </div>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
  </header>

  <!-- SIDEBAR OVERLAY -->
  <div class="sb-overlay hide" id="sbOverlay" onclick="closeSidebar()"></div>
  <aside class="sidebar hide" id="sidebar">
    <div class="sb-profile">
      <div class="sb-avatar"><i class="fas fa-user"></i></div>
      <div>
        <p class="sb-name" id="sbName">User</p>
        <p class="sb-email" id="sbEmail">user@email.com</p>
      </div>
    </div>
    <nav class="sb-nav">
      <button onclick="goView('home');closeSidebar()"><i class="fas fa-home"></i>Home</button>
      <button onclick="goView('stats');closeSidebar()"><i class="fas fa-chart-bar"></i>Stats</button>
      <button onclick="goView('calendar');closeSidebar()"><i class="fas fa-calendar-alt"></i>Calendar</button>
      <button onclick="goView('settings');closeSidebar()"><i class="fas fa-cog"></i>Settings</button>
    </nav>
    <button class="sb-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i>Logout</button>
  </aside>

  <!-- ── HOME VIEW ── -->
  <div id="viewHome" class="view active-view">

    <!-- Today summary card -->
    <div class="summary-card">
      <div class="sc-left">
        <p class="sc-lbl">TODAY'S EXPENSES</p>
        <p class="sc-amount" id="todayTotal">₹ 0.00</p>
        <p class="sc-sub"><i class="fas fa-wallet"></i>&nbsp;<span id="todayCount">0</span> Expenses Today</p>
      </div>
      <div class="sc-right">
        <i class="fas fa-calendar-alt sc-cal"></i>
        <p class="sc-date" id="scDate"></p>
        <p class="sc-day" id="scDay"></p>
      </div>
    </div>

    <!-- Add expense -->
    <div class="card">
      <p class="card-title"><i class="fas fa-plus-circle"></i>ADD NEW EXPENSE</p>
      <div class="form-grid">
        <div class="fg-item">
          <label>Currency</label>
          <div class="sel-wrap">
            <select id="curSel" onchange="document.getElementById('curBadge').textContent=this.value">
              <option value="₹">₹ INR</option>
              <option value="$">$ USD</option>
              <option value="€">€ EUR</option>
              <option value="£">£ GBP</option>
              <option value="¥">¥ JPY</option>
              <option value="₩">₩ KRW</option>
              <option value="A$">A$ AUD</option>
              <option value="C$">C$ CAD</option>
            </select>
            <i class="fas fa-chevron-down"></i>
          </div>
        </div>
        <div class="fg-item fg-grow">
          <label>Expense Name</label>
          <input type="text" id="expName" placeholder="Enter expense name" onkeydown="if(event.key==='Enter'){ doAddExpense(event); event.preventDefault(); }"/>
        </div>
        <div class="fg-item">
          <label>Amount</label>
          <div class="amt-wrap">
            <input type="number" id="expAmt" placeholder="0.00" min="0" step="0.01" onkeydown="if(event.key==='Enter'){ doAddExpense(event); event.preventDefault(); }"/>
            <span id="curBadge" class="cur-badge">₹</span>
          </div>
        </div>
      </div>
      <p class="form-err" id="addErr"></p>
      <button type="button" class="gold-btn" id="addBtn" onclick="doAddExpense()">
        <span id="addBtnTxt"><i class="fas fa-plus"></i>&nbsp;Add Expense</span>
        <span id="addSpin" class="spin hide"></span>
      </button>
    </div>

    <!-- Search + History -->
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInp" placeholder="Search expenses…" oninput="renderHistory()"/>
    </div>

    <div class="hist-header">
      <p class="card-title" style="margin:0"><i class="fas fa-history"></i>EXPENSE HISTORY</p>
      <button class="clear-all-btn" onclick="doClearAll()"><i class="fas fa-trash-alt"></i>Clear All</button>
    </div>

    <div id="historyList"></div>

  </div><!-- /viewHome -->

  <!-- ── STATS VIEW ── -->
  <div id="viewStats" class="view">
    <p class="view-title">Statistics</p>
    <div class="stats-cards" id="statsCards"></div>
    <div class="card" style="margin-top:14px">
      <p class="card-title"><i class="fas fa-chart-bar"></i>LAST 7 DAYS</p>
      <div id="barChart" class="bar-chart"></div>
    </div>
    <div class="card" style="margin-top:14px">
      <p class="card-title"><i class="fas fa-list"></i>TOP CATEGORIES</p>
      <div id="topList" class="top-list"></div>
    </div>
  </div>

  <!-- ── CALENDAR VIEW ── -->
  <div id="viewCalendar" class="view">
    <p class="view-title">Calendar</p>
    <div class="cal-nav">
      <button class="cal-arrow" onclick="calShift(-1)"><i class="fas fa-chevron-left"></i></button>
      <span id="calLabel" class="cal-label"></span>
      <button class="cal-arrow" onclick="calShift(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="cal-weeks" id="calWeeks"></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div id="calDetail" class="cal-detail hide"></div>
  </div>

  <!-- ── SETTINGS VIEW ── -->
  <div id="viewSettings" class="view">
    <p class="view-title">Settings</p>
    <div class="card settings-card">
      <div class="settings-user">
        <i class="fas fa-user-circle su-icon"></i>
        <div>
          <p class="su-name" id="suName"></p>
          <p class="su-email" id="suEmail"></p>
        </div>
      </div>
      <div class="settings-row">
        <span><i class="fas fa-moon"></i>&nbsp;Dark Mode</span>
        <label class="sw">
          <input type="checkbox" id="darkChk" onchange="toggleTheme()"/>
          <span class="sw-track"></span>
        </label>
      </div>
      <div class="settings-row">
        <span><i class="fas fa-coins"></i>&nbsp;Default Currency</span>
        <select id="defCurSel" class="settings-sel" onchange="saveDefCur()">
          <option value="₹">₹ INR</option>
          <option value="$">$ USD</option>
          <option value="€">€ EUR</option>
          <option value="£">£ GBP</option>
          <option value="¥">¥ JPY</option>
        </select>
      </div>
      <div class="settings-row">
        <span><i class="fas fa-info-circle"></i>&nbsp;Version</span>
        <span class="settings-val">1.0.0</span>
      </div>
      <button class="danger-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i>&nbsp;Logout</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="bn-btn active" id="bnHome" onclick="goView('home')">
      <i class="fas fa-home"></i><span>Home</span>
    </button>
    <button class="bn-btn" id="bnStats" onclick="goView('stats')">
      <i class="fas fa-chart-bar"></i><span>Stats</span>
    </button>
    <button class="bn-fab" onclick="fabAction()"><i class="fas fa-plus"></i></button>
    <button class="bn-btn" id="bnCalendar" onclick="goView('calendar')">
      <i class="fas fa-calendar-alt"></i><span>Calendar</span>
    </button>
    <button class="bn-btn" id="bnSettings" onclick="goView('settings')">
      <i class="fas fa-cog"></i><span>Settings</span>
    </button>
  </nav>

</div><!-- /appScreen -->

<!-- TOAST -->
<div id="toast" class="toast hide"></div>

<script type="module" src="script.js"></script>
</body>
</html>
